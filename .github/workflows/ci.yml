name: NetSentinel CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run Ruff Format Check
        run: ruff format --check src/ tests/

      - name: Run Ruff Lint Check
        run: ruff check src/ tests/

      - name: Run Mypy Strict Type Check
        run: mypy --strict src/

      - name: Run Bandit Security Check
        run: bandit -r src/

  test:
    runs-on: ubuntu-24.04
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap arp-scan tshark libgtk-4-dev libadwaita-1-dev gobject-introspection libgirepository1.0-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run Dependency Version Check
        run: ./scripts/check_versions.sh

      - name: Run Pytest with Coverage
        run: |
          pytest --cov=src --cov-fail-under=80
