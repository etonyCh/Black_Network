name: NetSentinel CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit dbus-next keyring cryptography pydantic google-genai

      - name: Run Ruff Format Check
        run: ruff format --check src/ tests/

      - name: Run Ruff Lint Check
        run: ruff check src/ tests/

      - name: Run Mypy Strict Type Check
        run: mypy --strict src/

      - name: Run Bandit Security Check
        run: bandit -r src/

  test:
    runs-on: ubuntu-24.04
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap arp-scan tshark libgtk-4-dev libadwaita-1-dev gobject-introspection libgirepository1.0-dev libgirepository-2.0-dev blueprint-compiler libcairo2-dev pkg-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Dependency Version Check
        run: ./scripts/check_versions.sh

      - name: Run Pytest with Coverage
        run: |
          pytest --cov=src --cov-fail-under=80

  build-deb:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Debian Package
        run: |
          mkdir -p build_deb/DEBIAN build_deb/usr/bin build_deb/usr/lib/python3/dist-packages build_deb/etc/dbus-1/system.d build_deb/usr/share/polkit-1/actions build_deb/usr/share/glib-2.0/schemas build_deb/usr/share/netsentinel/data
          
          cat <<EOF > build_deb/DEBIAN/control
          Package: netsentinel
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: all
          Depends: python3, python3-gi, gir1.2-gtk-4.0, gir1.2-adw-1, python3-dbus-next, nmap, arp-scan, tshark, blueprint-compiler
          Maintainer: etonyCh <egerimanatonycharmant@gmail.com>
          Description: NetSentinel native GNOME/GTK4 cybersecurity scanning and auditing tool.
          EOF

          cp -r src/netsentinel build_deb/usr/lib/python3/dist-packages/
          cp packaging/deb-helper/debian/org.netsentinel.Helper1.conf build_deb/etc/dbus-1/system.d/
          cp packaging/deb-helper/debian/org.netsentinel.helper.policy build_deb/usr/share/polkit-1/actions/
          cp data/org.netsentinel.NetSentinel.gschema.xml build_deb/usr/share/glib-2.0/schemas/
          cp data/gschemas.compiled build_deb/usr/share/glib-2.0/schemas/
          cp data/pqc_nist_reference.json data/vuln_database.json build_deb/usr/share/netsentinel/data/

          cat <<'EOF' > build_deb/usr/bin/netsentinel
          #!/bin/bash
          exec python3 -m netsentinel.helperd.dbus_service --session "$@"
          EOF
          chmod +x build_deb/usr/bin/netsentinel

          dpkg-deb --build build_deb netsentinel_0.1.0_all.deb

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netsentinel-deb-package
          path: netsentinel_0.1.0_all.deb
