<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root or netsentinel-helper user can own the service -->
  <policy user="root">
    <allow own="org.netsentinel.Helper1"/>
  </policy>
  <policy user="netsentinel-helper">
    <allow own="org.netsentinel.Helper1"/>
  </policy>

  <!-- Allow anyone to call methods, Polkit will enforce permissions -->
  <policy context="default">
    <allow send_destination="org.netsentinel.Helper1"
           send_interface="org.netsentinel.Helper1"/>
    <allow send_destination="org.netsentinel.Helper1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.netsentinel.Helper1"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>
